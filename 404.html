<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>页面走丢了 · 穿云 ChuanYun 内网穿透平台</title>
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#F7F4FF">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root{--ink:#1F1636;--muted:#5A5070;--line-2:rgba(124,92,190,.30);--violet:#8B5CF6;--violet-deep:#6D28D9;--pink:#EC4899;--pink-deep:#DB2777}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f4ff;color:var(--ink);
    font-family:"PingFang SC","HarmonyOS Sans SC","Microsoft YaHei",system-ui,sans-serif;text-align:center;padding:24px;
    background-image:
      radial-gradient(1000px 700px at 12% -8%,rgba(167,139,250,.40),transparent 60%),
      radial-gradient(900px 650px at 92% 4%,rgba(244,114,182,.32),transparent 58%),
      radial-gradient(1000px 800px at 80% 110%,rgba(125,211,252,.28),transparent 62%),
      linear-gradient(156deg,#f7f4ff,#fdf2fb 46%,#f0f8ff)}
  .card{background:rgba(255,255,255,.55);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
    border:1px solid rgba(255,255,255,.66);border-radius:24px;padding:52px 46px;
    box-shadow:0 26px 60px -22px rgba(139,92,246,.4),0 10px 26px -12px rgba(236,72,153,.28),inset 0 1px 0 rgba(255,255,255,.8)}
  .code{font-family:"JetBrains Mono",ui-monospace,Consolas,monospace;font-size:96px;font-weight:700;letter-spacing:-.02em;line-height:1;
    background:linear-gradient(118deg,#7C3AED,#9333EA 42%,#DB2777);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:24px;margin:10px 0 12px}
  p{color:var(--muted);max-width:460px;margin:0 auto 30px;line-height:1.7}
  .cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{font-weight:600;font-size:15px;padding:12px 22px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;text-decoration:none}
  .primary{background:linear-gradient(118deg,#7C3AED,#9333EA 42%,#DB2777);color:#fff;text-shadow:0 1px 1px rgba(60,10,50,.3);box-shadow:0 16px 34px -14px rgba(168,85,247,.7)}
  .ghost{border:1px solid var(--line-2);color:var(--violet-deep);background:rgba(255,255,255,.55)}
</style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>这条隧道好像没有接通</h1>
    <p>你要找的页面不存在或已移动。回到首页了解穿云内网穿透平台，或直接进入控制台创建你的隧道。</p>
    <div class="cta">
      <a class="btn primary" href="/">返回首页</a>
      <a class="btn ghost" href="https://x.svtun.cn" rel="noopener">进入控制台</a>
    </div>
  </main>
</body>
</html>
